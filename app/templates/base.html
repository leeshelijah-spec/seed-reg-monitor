<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Seed Regulation Monitor{% endblock %}</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-brand">
        <p class="eyebrow">Daily Compliance Watch</p>
        <h1><a href="/">Seed Regulation Monitor</a></h1>
        <p class="topbar-subtitle">규제 모니터링과 네이버 뉴스 기반 산업 트렌드 대응을 한 화면에서 함께 관리합니다.</p>
      </div>
      <div class="topbar-actions">
        <button class="sync-button sync-button-compact" type="button" data-sync-trigger="regulation">규제 동기화</button>
        <button class="sync-button secondary sync-button-compact" type="button" data-sync-trigger="news">뉴스 수집</button>
        {% block topbar_actions_extra %}{% endblock %}
      </div>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>
  </div>

  <div id="syncStatusModal" class="modal-backdrop hidden" data-sync-modal aria-hidden="true">
    <div class="modal-dialog panel sync-progress-modal" role="dialog" aria-modal="true" aria-labelledby="syncStatusModalTitle">
      <div class="modal-header">
        <div>
          <p class="eyebrow">Sync Status</p>
          <h3 id="syncStatusModalTitle">동기화 진행도</h3>
          <p class="section-meta">동기화는 백그라운드로 실행되며 진행 상황이 자동으로 갱신됩니다.</p>
        </div>
        <button class="ghost-button sync-button-compact" type="button" data-sync-modal-close>닫기</button>
      </div>

      <div class="sync-progress-grid">
        <article class="sync-progress-card" data-sync-kind="regulation">
          <div class="sync-progress-head">
            <strong>규제 동기화</strong>
            <span class="sync-progress-state sync-progress-state--idle" data-sync-state>대기</span>
          </div>
          <div class="sync-progress-bar">
            <span class="sync-progress-fill" data-sync-fill style="width: 0%"></span>
          </div>
          <div class="sync-progress-meta">
            <span data-sync-percent>0%</span>
            <span data-sync-count>0 / 1</span>
          </div>
          <p class="sync-progress-message" data-sync-message>대기 중입니다.</p>
        </article>

        <article class="sync-progress-card" data-sync-kind="news">
          <div class="sync-progress-head">
            <strong>뉴스 수집</strong>
            <span class="sync-progress-state sync-progress-state--idle" data-sync-state>대기</span>
          </div>
          <div class="sync-progress-bar">
            <span class="sync-progress-fill" data-sync-fill style="width: 0%"></span>
          </div>
          <div class="sync-progress-meta">
            <span data-sync-percent>0%</span>
            <span data-sync-count>0 / 1</span>
          </div>
          <p class="sync-progress-message" data-sync-message>대기 중입니다.</p>
        </article>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const statusLabels = {
        idle: "대기",
        running: "진행 중",
        success: "완료",
        failed: "오류",
      };
      const defaultLabels = {
        regulation: "규제 동기화",
        news: "뉴스 수집",
      };
      const syncButtons = Object.fromEntries(
        [...document.querySelectorAll("[data-sync-trigger]")].map((button) => [button.dataset.syncTrigger, button]),
      );
      const syncCards = Object.fromEntries(
        [...document.querySelectorAll("[data-sync-kind]")].map((card) => [card.dataset.syncKind, card]),
      );
      const syncModal = document.querySelector("[data-sync-modal]");
      let pollTimer = null;

      const setSyncModalOpen = (isOpen) => {
        if (!syncModal) {
          return;
        }
        syncModal.classList.toggle("hidden", !isOpen);
        syncModal.setAttribute("aria-hidden", isOpen ? "false" : "true");
        document.body.classList.toggle("modal-open", isOpen);
      };

      const renderSyncCard = (kind, state = {}) => {
        const card = syncCards[kind];
        if (!card) {
          return;
        }

        const status = state.status || "idle";
        const total = Math.max(Number(state.total || 1), 1);
        const current = Math.max(0, Math.min(Number(state.current || 0), total));
        const percent = Math.max(0, Math.min(Number(state.percent || 0), 100));
        const message = state.message || "대기 중입니다.";

        card.querySelector("[data-sync-state]").textContent = statusLabels[status] || status;
        card.querySelector("[data-sync-state]").className = `sync-progress-state sync-progress-state--${status}`;
        card.querySelector("[data-sync-fill]").style.width = `${percent}%`;
        card.querySelector("[data-sync-percent]").textContent = `${percent}%`;
        card.querySelector("[data-sync-count]").textContent = `${current} / ${total}`;
        card.querySelector("[data-sync-message]").textContent = message;

        const button = syncButtons[kind];
        if (!button) {
          return;
        }

        button.disabled = status === "running";
        button.textContent = status === "running" ? `${defaultLabels[kind]} 중` : defaultLabels[kind];
      };

      const renderSyncState = (payload) => {
        const regulation = payload.regulation || {};
        const news = payload.news || {};
        renderSyncCard("regulation", regulation);
        renderSyncCard("news", news);

        const hasRunning = [regulation, news].some((item) => item.status === "running");
        if (hasRunning && !pollTimer) {
          pollTimer = window.setInterval(fetchSyncStatus, 1000);
        }
        if (!hasRunning && pollTimer) {
          window.clearInterval(pollTimer);
          pollTimer = null;
        }
      };

      const fetchSyncStatus = async () => {
        try {
          const response = await fetch("/api/sync/status", {
            headers: { Accept: "application/json" },
          });
          if (!response.ok) {
            throw new Error(`status ${response.status}`);
          }
          renderSyncState(await response.json());
        }
        catch (error) {
          console.error("Failed to load sync status", error);
        }
      };

      const startSync = async (kind) => {
        setSyncModalOpen(true);
        await fetchSyncStatus();
        try {
          const response = await fetch(`/api/sync/${kind}/start`, {
            method: "POST",
            headers: { Accept: "application/json" },
          });
          if (!response.ok) {
            throw new Error(`status ${response.status}`);
          }
          renderSyncState(await response.json());
        }
        catch (error) {
          console.error(`Failed to start ${kind} sync`, error);
        }
      };

      Object.values(syncButtons).forEach((button) => {
        button.addEventListener("click", () => startSync(button.dataset.syncTrigger));
      });

      syncModal?.querySelectorAll("[data-sync-modal-close]").forEach((button) => {
        button.addEventListener("click", () => setSyncModalOpen(false));
      });

      syncModal?.addEventListener("click", (event) => {
        if (event.target === syncModal) {
          setSyncModalOpen(false);
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          setSyncModalOpen(false);
        }
      });
    })();
  </script>
</body>
</html>
