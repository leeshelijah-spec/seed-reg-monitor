<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Seed Regulation Monitor{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-brand">
        <p class="eyebrow">Daily Compliance Watch</p>
        <h1><a href="/">Seed Regulation Monitor</a></h1>
        <p class="topbar-subtitle">규제 모니터링과 네이버 뉴스 기반 산업 트렌드 대응을 한 화면에서 함께 관리합니다.</p>
      </div>
      <div class="topbar-actions">
        <form action="/sync" method="post">
          <button class="sync-button sync-button-compact" type="submit">규제 동기화</button>
        </form>
        <form action="/news/sync" method="post">
          <button class="sync-button secondary sync-button-compact" type="submit">뉴스 수집</button>
        </form>
      </div>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
